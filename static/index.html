<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debate SDK Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { margin-bottom: 1rem; }
    h2 { margin: 1.5rem 0 0.5rem; font-size: 1.1rem; }
    .section { background: #f5f5f5; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 600; font-size: 0.85rem; }
    input, select, textarea { width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; margin-bottom: 0.5rem; }
    textarea { resize: vertical; min-height: 60px; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: default; }
    .btn-secondary { background: #6b7280; color: #fff; margin-left: 0.5rem; }
    .btn-secondary:hover { background: #4b5563; }
    #status { padding: 0.5rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .status-disconnected { background: #fee2e2; color: #991b1b; }
    .status-connected { background: #dcfce7; color: #166534; }
    #event-log { background: #0f172a; color: #e2e8f0; border-radius: 8px; padding: 0.75rem; height: 350px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; line-height: 1.4; }
    .event-entry { margin-bottom: 0.25rem; }
    .event-type { color: #38bdf8; font-weight: bold; }
    .event-time { color: #64748b; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  </style>
</head>
<body>

<h1>debaterhub-sdk Test Page</h1>

<!-- Create Debate -->
<div class="section">
  <h2>Create Debate (Mode 2: Server-Managed)</h2>
  <label for="topic">Topic / Resolution</label>
  <input type="text" id="topic" value="Artificial intelligence will do more good than harm for society" />
  <label for="side">Human Side</label>
  <select id="side">
    <option value="aff">Affirmative</option>
    <option value="neg">Negative</option>
  </select>
  <button class="btn-primary" id="btn-create" onclick="createDebate()">Create Debate</button>
</div>

<!-- Connection Status -->
<div id="status" class="status-disconnected">Disconnected</div>

<!-- Event Log -->
<div class="section">
  <h2>Event Log</h2>
  <div id="event-log"></div>
</div>

<!-- Actions -->
<div class="section">
  <h2>Actions</h2>

  <label for="speech-type">Speech Type</label>
  <select id="speech-type">
    <option value="AC">AC</option>
    <option value="AC-CX">AC-CX</option>
    <option value="NC">NC</option>
    <option value="NC-CX">NC-CX</option>
    <option value="1AR">1AR</option>
    <option value="NR">NR</option>
    <option value="2AR">2AR</option>
  </select>

  <label for="speech-text">Speech / Question / Answer Text</label>
  <textarea id="speech-text" placeholder="Enter speech text, CX question, or CX answer..."></textarea>

  <div class="actions">
    <button class="btn-primary" onclick="submitSpeech()" id="btn-speech" disabled>Submit Speech</button>
    <button class="btn-secondary" onclick="submitCXQuestion()" id="btn-cx-q" disabled>CX Question</button>
    <button class="btn-secondary" onclick="submitCXAnswer()" id="btn-cx-a" disabled>CX Answer</button>
    <button class="btn-secondary" onclick="endCX()" id="btn-end-cx" disabled>End CX</button>
    <button class="btn-secondary" onclick="endPrepTime()" id="btn-prep" disabled>End Prep</button>
    <button class="btn-secondary" onclick="requestCoaching()" id="btn-coach" disabled>Coaching</button>
  </div>
</div>

<script>
  let ws = null;
  let debateId = null;

  const log = document.getElementById('event-log');
  const status = document.getElementById('status');

  function addLog(type, data) {
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'event-entry';
    entry.innerHTML = `<span class="event-time">[${time}]</span> <span class="event-type">${type}</span> ${JSON.stringify(data)}`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function setConnected(connected) {
    status.textContent = connected ? `Connected — debate: ${debateId}` : 'Disconnected';
    status.className = connected ? 'status-connected' : 'status-disconnected';
    document.querySelectorAll('.actions button').forEach(b => b.disabled = !connected);
  }

  async function createDebate() {
    const topic = document.getElementById('topic').value;
    const humanSide = document.getElementById('side').value;
    document.getElementById('btn-create').disabled = true;

    try {
      const resp = await fetch('/debates/managed', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, human_side: humanSide }),
      });
      const data = await resp.json();
      if (!resp.ok) { addLog('ERROR', data); return; }

      debateId = data.debate_id;
      addLog('CREATED', { debate_id: debateId });
      connectWS();
    } catch (e) {
      addLog('ERROR', { message: e.message });
    } finally {
      document.getElementById('btn-create').disabled = false;
    }
  }

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/debates/${debateId}/ws`);

    ws.onopen = () => { setConnected(true); addLog('WS', { status: 'connected' }); };
    ws.onclose = (e) => { setConnected(false); addLog('WS', { status: 'closed', code: e.code }); };
    ws.onerror = () => { addLog('WS', { status: 'error' }); };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        addLog(data.type || 'unknown', data);
      } catch { addLog('RAW', { data: e.data }); }
    };
  }

  function send(payload) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(payload));
      addLog('SENT', payload);
    }
  }

  function submitSpeech() {
    send({
      action: 'submit_speech',
      speech_type: document.getElementById('speech-type').value,
      transcript: document.getElementById('speech-text').value,
    });
  }

  function submitCXQuestion() {
    send({
      action: 'cx_question',
      question: document.getElementById('speech-text').value,
    });
  }

  function submitCXAnswer() {
    send({
      action: 'cx_answer',
      answer: document.getElementById('speech-text').value,
    });
  }

  function endCX() {
    send({ action: 'end_cx', speech_type: document.getElementById('speech-type').value });
  }

  function endPrepTime() {
    send({ action: 'end_prep_time' });
  }

  function requestCoaching() {
    send({ action: 'request_coaching', for_speech: document.getElementById('speech-type').value });
  }
</script>
</body>
</html>
